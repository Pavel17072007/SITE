<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина - FlashFood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-badge">FF</span>
          <span class="brand-text">
            <strong>FlashFood</strong>
            <small>Быстро, Дёшево и Вкусно</small>
          </span>
        </a>
        <nav class="nav">
          <a href="/">Главная</a>
          <a href="/#catalog">Каталог</a>
          <a href="/cart">Корзина</a>
          <a href="/auth/login">Войти</a>
          <a href="/profile">Профиль</a>
        </nav>
        <button class="ghost-button" id="logoutButton" hidden>Выйти</button>
      </header>

      <main>
        <section class="section route-block" id="cartSection">
          <div class="section-heading">
            <div>
              <span class="eyebrow">Покупки</span>
              <h2>Ваша корзина</h2>
            </div>
          </div>
          <a class="cart-back-link" href="/">← Назад к покупкам</a>
          <div id="cartContent"></div>
        </section>
      </main>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
